<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Serverless AI Dashboard</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 40px auto; }
    textarea { width: 100%; height: 120px; }
    button { padding: 10px 16px; margin-top: 10px; }
    .box { margin-top: 20px; padding: 12px; border: 1px solid #ddd; }
    code { background: #f6f6f6; padding: 2px 6px; }
  </style>
</head>
<body>
  <h1>Serverless AI Deployment Lab by Ahmed Omar Salim Adnan</h1>
  <p>Enter text and click Predict. Endpoint: <code id="endpoint"></code></p>

  <textarea id="text" placeholder="Type text here...">This project by Ahmed Omar Salim is Great!</textarea>
  <br/>
  <button onclick="predict()">Predict</button>

  <div class="box">
    <h3>Result</h3>
    <pre id="out">—</pre>
  </div>

<script>

  const API_BASE = "https://ehhhog64va.execute-api.us-east-2.amazonaws.com";

  document.getElementById("endpoint").textContent = API_BASE + "/predict";

  async function predict() {
    const text = document.getElementById("text").value;
    const out = document.getElementById("out");
    out.textContent = "Loading...";

    try {
      const res = await fetch(API_BASE + "/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });

      const data = await res.json();
      out.textContent = JSON.stringify(data, null, 2);
    } catch (e) {
      out.textContent = "Error: " + e.message;
    }
  }
</script>
</body>
</html>
